<svg xmlns="http://www.w3.org/2000/svg" width="420" height="84" viewBox="0 0 420 84">
  <defs>
    <filter id="gc">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gp">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="go">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gcore">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#508cff"/>
      <stop offset="100%" stop-color="#508cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ring mark, centered at (42, 42) -->

  <!-- Outer ring — cyan -->
  <circle cx="42" cy="42" r="36" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1.5"/>
  <circle cx="42" cy="42" r="36" fill="none" stroke="#00d4ff" stroke-width="1.5"
          stroke-dasharray="113 113" filter="url(#gc)" opacity="0.9"/>

  <!-- Mid ring — purple, reversed -->
  <circle cx="42" cy="42" r="26" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1.3"/>
  <circle cx="42" cy="42" r="26" fill="none" stroke="#a78bfa" stroke-width="1.3"
          stroke-dasharray="82 82" stroke-dashoffset="-41"
          filter="url(#gp)" opacity="0.85"/>

  <!-- Inner ring — orange -->
  <circle cx="42" cy="42" r="15" fill="none" stroke="rgba(255,107,53,0.10)" stroke-width="1.1"/>
  <circle cx="42" cy="42" r="15" fill="none" stroke="#ff6b35" stroke-width="1.1"
          stroke-dasharray="47 47" filter="url(#go)" opacity="0.8"/>

  <!-- Core -->
  <circle cx="42" cy="42" r="5" fill="url(#cg)" filter="url(#gcore)"/>
  <circle cx="42" cy="42" r="2.2" fill="#508cff" opacity="0.95"/>

  <!-- Wordmark: MORPHON + ENGINE -->
  <text y="52"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" letter-spacing="4">
    <tspan x="96" font-weight="300" fill="#f0f4ff">MORPHON</tspan><tspan font-weight="600" fill="#508cff">ENGINE</tspan>
  </text>
</svg>
