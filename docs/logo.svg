<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240">
  <defs>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-core">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="core-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#508cff"/>
      <stop offset="70%"  stop-color="#508cff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#508cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="480" height="240" fill="#06080f" rx="12"/>

  <!-- Outer ring — cyan, top-arc bright -->
  <circle cx="240" cy="106" r="56" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1.2"/>
  <circle cx="240" cy="106" r="56" fill="none" stroke="#00d4ff" stroke-width="1.2"
          stroke-dasharray="176 176" filter="url(#glow-cyan)" opacity="0.9"/>

  <!-- Mid ring — purple, right-arc bright, reversed -->
  <circle cx="240" cy="106" r="40" fill="none" stroke="rgba(167,139,250,0.08)" stroke-width="1.1"/>
  <circle cx="240" cy="106" r="40" fill="none" stroke="#a78bfa" stroke-width="1.1"
          stroke-dasharray="126 126" stroke-dashoffset="-63"
          filter="url(#glow-purple)" opacity="0.85"/>

  <!-- Inner ring — orange, top-arc bright -->
  <circle cx="240" cy="106" r="24" fill="none" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
  <circle cx="240" cy="106" r="24" fill="none" stroke="#ff6b35" stroke-width="1"
          stroke-dasharray="75 75" filter="url(#glow-orange)" opacity="0.8"/>

  <!-- Core -->
  <circle cx="240" cy="106" r="8" fill="url(#core-grad)" filter="url(#glow-core)"/>
  <circle cx="240" cy="106" r="3.5" fill="#508cff" opacity="0.95"/>

  <!-- Wordmark: MORPHON light + ENGINE accent, as one baseline -->
  <text y="186" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" letter-spacing="10">
    <tspan x="240" font-weight="200" fill="#f0f4ff">MORPHON</tspan><tspan font-weight="500" fill="#508cff">ENGINE</tspan>
  </text>

  <!-- Subtitle -->
  <text x="240" y="208" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="7.5" font-weight="400"
        fill="#5a6a88" letter-spacing="3.5">INITIALIZING MORPHOGENIC INTELLIGENCE</text>
</svg>
